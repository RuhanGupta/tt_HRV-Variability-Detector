# Tiny Tapeout project information
project:
  source_files:
    - "main.v"
    - "supporting_modules.v"
  top_module: "tt_um_fatigue_monitor"
  title: "Fatigue Monitor (PPG Pulse-Interval Variability)"
  author: "Ruhan Gupta"
  discord: ""
  description: "Reads IR PPG samples from a MAX30102 over I2C, detects pulse peaks, and raises an alert on a sustained drop in pulse-interval variability"
  language: "Verilog"
  clock_hz: 10000000

  # Placeholder — real value only known after hardening. Adjust once CI reports actual area.
  tiles: "2x2"

  pinout:
    # Inputs
    ui[0]: ""
    ui[1]: ""
    ui[2]: ""
    ui[3]: ""
    ui[4]: ""
    ui[5]: ""
    ui[6]: ""
    ui[7]: ""
    # Outputs
    uo[0]: "alert_out"
    uo[1]: "sensor_fault"
    uo[2]: "calibrated"
    uo[3]: "beat_debug"
    uo[4]: "calibrating_init"
    uo[5]: "sample_valid"
    uo[6]: "variability_valid"
    uo[7]: ""
    # Bidirectional pins
    uio[0]: "I2C SDA"
    uio[1]: "I2C SCL"
    uio[2]: ""
    uio[3]: ""
    uio[4]: ""
    uio[5]: ""
    uio[6]: ""
    uio[7]: ""

yaml_version: 6
